<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 0; background: transparent; }
    #stage { display: block; }
  </style>
  <script src="./lottie.min.js"></script>
</head>
<body>
  <div id="stage"></div>
  <script>
    let _anim = null;

    window._loadLottie = function (animationData, w, h) {
      const stage = document.getElementById('stage');
      stage.style.width = w + 'px';
      stage.style.height = h + 'px';
      _anim = lottie.loadAnimation({
        container: stage,
        renderer: 'svg',
        loop: false,
        autoplay: false,
        animationData,
      });
      _anim.setSubframe(true);
    };

    window._goToFrame = function (frame) {
      if (!_anim) return;
      _anim.goToAndStop(frame, true);
    };
  </script>
</body>
</html>
